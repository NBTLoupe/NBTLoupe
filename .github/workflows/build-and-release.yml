name: Build and Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target.rid }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      matrix:
        target:
          - { rid: osx-x64, os: macos-26 }
          - { rid: osx-arm64, os: macos-26 }
          - { rid: win-x64, os: windows-2025 }
          - { rid: win-arm64, os: windows-2025 }
          - { rid: linux-x64, os: ubuntu-26.04 }
          - { rid: linux-arm64, os: ubuntu-26.04-arm } # Cross-compiling doesn't work on GNU/Linux by default, and using an ARM64 runner is quicker than installing the required dependencies on an x86_64 runner.
          

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Set version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV


      - name: Publish (Release)
        shell: bash
        run: |
          dotnet publish NBTLoupe -r ${{ matrix.target.rid }} -c Release -o publish/${{ matrix.target.rid }} ${VERSION:+-p:Version=$VERSION}

      - name: Publish (Debug)
        shell: bash
        run: |
          dotnet publish NBTLoupe -r ${{ matrix.target.rid }} -c Debug -o publish-DEBUG/${{ matrix.target.rid }} ${VERSION:+-p:Version=$VERSION-DEBUG}


      - name: Bundle .app (macOS)
        if: startsWith(matrix.target.rid, 'osx-')
        shell: bash
        run: |
          mkdir -p "publish/dmg/NBTLoupe.app/Contents/MacOS" "publish/dmg/NBTLoupe.app/Contents/Resources"

          cp ASSETS/icons/NBTLoupe.icns "publish/dmg/NBTLoupe.app/Contents/Resources/"

          mv publish/${{ matrix.target.rid }}/NBTLoupe publish/${{ matrix.target.rid }}/*.dylib "publish/dmg/NBTLoupe.app/Contents/MacOS/"
          chmod +x "publish/dmg/NBTLoupe.app/Contents/MacOS/NBTLoupe"

          cat > "publish/dmg/NBTLoupe.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleExecutable</key>
          <string>NBTLoupe</string>
          <key>CFBundleIdentifier</key>
          <string>com.github.nbtloupe.nbtloupe</string>
          <key>CFBundleName</key>
          <string>NBTLoupe</string>
          <key>CFBundleIconFile</key>
          <string>NBTLoupe.icns</string>
          <key>CFBundleVersion</key>
          <string>$VERSION</string>
          <key>CFBundleShortVersionString</key>
          <string>$VERSION</string>
          <key>CFBundlePackageType</key>
          <string>APPL</string>
          <key>NSHighResolutionCapable</key>
          <true/>
          <key>NSHumanReadableCopyright</key>
          <string>Copyright (c) 2024-2026 MallardLuna. Licensed under the MIT license.</string>
          </dict>
          </plist>
          EOF

      - name: DMG .app (macOS)
        if: startsWith(matrix.target.rid, 'osx-')
        shell: bash
        run: |
          cd publish
          ln -s /Applications dmg/Applications
          diskutil image create from dmg "NBTLoupe-v$VERSION-RELEASE-${{ matrix.target.rid }}.dmg" --volumeName "NBTLoupe v$VERSION" -f UDZO


      - name: Prepare .AppImage (GNU/Linux)
        if: startsWith(matrix.target.rid, 'linux-')
        shell: bash
        run: |
          mkdir -p "publish/NBTLoupe.AppDir/usr/bin" "publish/NBTLoupe.AppDir/usr/share/applications" "publish/NBTLoupe.AppDir/usr/share/metainfo" "publish/NBTLoupe.AppDir/usr/share/icons"

          cp -R ASSETS/icons/xdg "publish/NBTLoupe.AppDir/usr/share/icons/hicolor"
          cp "publish/NBTLoupe.AppDir/usr/share/icons/hicolor/256x256/apps/NBTLoupe.png" "publish/NBTLoupe.AppDir/"

          mv publish/${{ matrix.target.rid }}/NBTLoupe publish/${{ matrix.target.rid }}/*.so "publish/NBTLoupe.AppDir/usr/bin/"
          chmod +x "publish/NBTLoupe.AppDir/usr/bin/NBTLoupe"


          cat > "publish/NBTLoupe.AppDir/AppRun" << 'EOF'
          #!/bin/sh
          #
          # Copyright (c) 2004-20 Simon Peter
          # SPDX-License-Identifier: MIT
          #
          # Derived from https://github.com/AppImage/AppImageKit/wiki/Bundling-.NET-Core-apps
          #

          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}"/usr/bin/:"${PATH}"
          EXEC=$(grep -e '^Exec=.*' "${HERE}"/*.desktop | head -n 1 | cut -d "=" -f 2 | cut -d " " -f 1)
          exec "${EXEC}" $@
          EOF
          chmod +x "publish/NBTLoupe.AppDir/AppRun"


          cat > "publish/NBTLoupe.AppDir/usr/share/applications/com.github.nbtloupe.nbtloupe.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=NBTLoupe
          Comment=MallardLuna's native cross-platform fork of NBTExplorer
          Icon=NBTLoupe
          Categories=Utility;FileTools;
          Exec=NBTLoupe
          EOF
          cp "publish/NBTLoupe.AppDir/usr/share/applications/com.github.nbtloupe.nbtloupe.desktop" "publish/NBTLoupe.AppDir/com.github.nbtloupe.nbtloupe.desktop"


          cat > "publish/NBTLoupe.AppDir/usr/share/metainfo/com.github.nbtloupe.nbtloupe.appdata.xml" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.github.nbtloupe.nbtloupe</id>
            <metadata_license>MIT</metadata_license>
            <project_license>MIT</project_license>
            <name>NBTLoupe</name>
            <summary>MallardLuna's native cross-platform fork of NBTExplorer</summary>
            <description>
              <p>NBTLoupe is MallardLuna's fork of Justin Aquadro's NBTExplorer (which is itself
                based on NBTEdit by copygirl).</p>
              <p>A big chunk of the Minecraft community heavily depends on NBTExplorer. And although this
                shows its excellence, it's also starting to show its age and limited native platform
                support.</p>
              <p>NBTLoupe tries to close that gap with the help of .NET 10 and a GUI written from
                the ground up in Avalonia.</p>
            </description>
            <launchable type="desktop-id">com.github.nbtloupe.nbtloupe.desktop</launchable>
            <url type="homepage">https://github.com/NBTLoupe/NBTLoupe</url>
            <screenshots>
              <screenshot type="default">
                <caption>NBTLoupe with an example level.dat open.</caption>
                <image>https://raw.githubusercontent.com/NBTLoupe/NBTLoupe/refs/heads/master/ASSETS/screenshots/KDE-Plasma.png</image>
              </screenshot>
            </screenshots>
            <releases>
              <release version="$VERSION" date="$(date +%F)" />
            </releases>
            <content_rating type="oars-1.0" />
            <developer id="com.github.nbtloupe">
              <name>MallardLuna</name>
            </developer>
            <provides>
              <id>com.github.nbtloupe.nbtloupe.desktop</id>
            </provides>
          </component>
          EOF

      - name: Bundle .AppImage (GNU/Linux)
        if: startsWith(matrix.target.rid, 'linux-')
        shell: bash
        run: |
          cd publish
          curl -Lo ./appimagetool.AppImage "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-$(uname -m).AppImage"
          chmod +x ./appimagetool.AppImage
          ./appimagetool.AppImage NBTLoupe.AppDir "NBTLoupe-v$VERSION-RELEASE-${{ matrix.target.rid }}.AppImage"


      - name: Zip artifact (Windows)
        if: startsWith(matrix.target.rid, 'win-')
        shell: pwsh
        run: Compress-Archive -Path "publish/${{ matrix.target.rid }}/NBTLoupe.exe", "publish/${{ matrix.target.rid }}/*.dll" -DestinationPath "publish/NBTLoupe-v$env:VERSION-RELEASE-${{ matrix.target.rid }}.zip"


      - name: Upload artifacts (Release)
        uses: actions/upload-artifact@v7
        with:
          name: NBTLoupe-v${{ env.VERSION }}-RELEASE-${{ matrix.target.rid }}
          path: publish/NBTLoupe-v${{ env.VERSION }}-RELEASE-${{ matrix.target.rid }}.*
          archive: false

      - name: Upload artifacts (Debug)
        uses: actions/upload-artifact@v7
        with:
          name: NBTLoupe-v${{ env.VERSION }}-DEBUG-${{ matrix.target.rid }}
          path: publish-DEBUG/${{ matrix.target.rid }}/

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          skip-decompress: true

      - name: Create release
        id: uploadRelease
        uses: softprops/action-gh-release@v3
        with:
          name: NBTLoupe ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.dmg
            artifacts/*.AppImage
